# QuietCool Smart Attic Fan Control Configuration
# This configuration file enables control of a QuietCool Smart Attic Fan Control via ESPHome
# It provides BLE connectivity, fan speed control, timer functionality, and sensor monitoring

# Core Configuration
# ----------------------------------------
# Define BLE service and characteristic UUIDs used for communication with the fan
substitutions:
  service_uuid: "000000ff-0000-1000-8000-00805f9b34fb"
  characteristic_uuid: "0000ff01-0000-1000-8000-00805f9b34fb"
  mac_address: "00:00:00:00:00:00"

esp32_ble_tracker:
  scan_parameters:
    active: false

# BLE client configuration for maintaining connection with the fan
# Automatically connects and sends login credentials on connection
ble_client:
  - mac_address: ${mac_address}
    id: qc_ble
    auto_connect: true
    on_connect:
      - delay: 2s
      - script.execute:
          id: send_ble_msg
          msg: !lambda return "{\"A\":13,\"P\":\"" + id(pair_id).state + "\"}";
      - script.wait: send_ble_msg

# Global Variables and Utilities
# ----------------------------------------
# Enable JSON parsing for BLE communication
json:

# Global variable to store BLE messages
globals:
  - id: ble_message
    type: std::string
    initial_value: ""
    restore_value: no
  - id: quietcool_mode_state
    type: std::string
    initial_value: '"Idle"'
    restore_value: no
  # A:2 does not store manual Run speed. This is updated only from A:1.R live state
  # or from the user's requested fan speed before sending A:18.
  - id: quietcool_selected_range
    type: std::string
    initial_value: '"LOW"'
    restore_value: no
  # A:2.L is timer speed only. QuietCool's medium command value is MED.
  - id: quietcool_timer_range
    type: std::string
    initial_value: '"LOW"'
    restore_value: no

script:
  - id: set_mode
    parameters:
      mode: string
    then:
      - script.execute:
          id: send_ble_msg
          msg: !lambda return "{\"A\":9,\"M\":\"" + mode + "\"}";
      - script.wait: send_ble_msg
      - delay: 2s
      - script.execute:
          id: send_ble_msg
          # Poll live state after mode writes so Home Assistant updates quickly.
          msg: !lambda return "{\"A\":1}";
      - script.wait: send_ble_msg
      - script.execute:
          id: send_ble_msg
          # Poll parameters after mode writes to confirm persisted/configured state.
          msg: !lambda return "{\"A\":2}";
      - script.wait: send_ble_msg
  - id: set_manual_range
    parameters:
      speed: string
    then:
      - script.execute:
          id: send_ble_msg
          msg: !lambda |-
            std::string command_speed = (speed == "MEDIUM") ? "MED" : speed;
            return "{\"A\":18,\"S\":\"" + command_speed + "\"}";
      - script.wait: send_ble_msg
      - delay: 1s
      - script.execute:
          id: send_ble_msg
          # Poll live state after manual range writes so the fan entity reflects A:1.R.
          msg: !lambda return "{\"A\":1}";
      - script.wait: send_ble_msg
  - id: set_timer
    parameters:
      hours: int
      minutes: int
      speed: string
    then:
      - script.execute:
          id: send_ble_msg
          msg: !lambda |-
            std::string command_speed = (speed == "MEDIUM") ? "MED" : speed;
            return "{\"A\":7,\"H\":" + std::to_string(hours) + ",\"M\":" + std::to_string(minutes) + ",\"R\":\"" + command_speed + "\"}";
      - script.wait: send_ble_msg
      - delay: 1s
      - script.execute:
          id: send_ble_msg
          # Poll parameters after timer config writes so Timer Hours/Minutes/Speed readbacks update.
          msg: !lambda return "{\"A\":2}";
      - script.wait: send_ble_msg
  - id: start_quietcool_mode
    parameters:
      mode: string
    then:
      - if:
          condition:
            lambda: return mode == "Timer";
          then:
            # A:7 sets timer hours/minutes/speed. Manual Run speed is live/volatile and is not stored in A:2.
            - script.execute:
                id: set_timer
                hours: !lambda return (int) id(timer_hours).state;
                minutes: !lambda return (int) id(timer_minutes).state;
                speed: !lambda return id(quietcool_timer_range);
            - script.wait: set_timer
      - if:
          condition:
            lambda: return mode == "Run";
          then:
            # A:18 sets the live/manual range. It is separate from A:7 timer speed.
            - script.execute:
                id: set_manual_range
                speed: !lambda return id(quietcool_selected_range);
            - script.wait: set_manual_range
      - script.execute:
          id: set_mode
          mode: !lambda return mode;
      - script.wait: set_mode
  - id: send_ble_msg
    parameters:
      msg: string
    mode: queued
    then:
      - ble_client.ble_write:
          id: qc_ble
          service_uuid: ${service_uuid}
          characteristic_uuid: ${characteristic_uuid}
          value: !lambda |-
              ESP_LOGI("quietcool", "Sending BLE message: %s", msg.c_str());
              return std::vector<uint8_t>(msg.begin(), msg.end());
      - delay: 1s

# Fan Component Configuration
# ----------------------------------------
# Template-based fan platform that provides:
# - Three speed levels (LOW/MED/HIGH) using A:18 live/manual range writes
# - Manual continuous Run mode operation
# - State restoration after power loss
fan:
  - platform: template
    name: "QuietCool Fan"
    id: quietcool_fan
    has_direction: false
    has_oscillating: false
    speed_count: 3
    restore_mode: RESTORE_DEFAULT_OFF
    on_speed_set:
      - logger.log: "Setting manual run speed"
      - lambda: |-
          if (x == 3) {
            id(quietcool_selected_range) = "HIGH";
          } else if (x == 2) {
            id(quietcool_selected_range) = "MED";
          } else {
            id(quietcool_selected_range) = "LOW";
          }
      - script.execute:
          id: start_quietcool_mode
          mode: "Run"
      - script.wait: start_quietcool_mode
    on_turn_on:
      - logger.log: "Turning on run mode"
      - lambda: |-
          if (id(quietcool_fan).speed == 3) {
            id(quietcool_selected_range) = "HIGH";
          } else if (id(quietcool_fan).speed == 2) {
            id(quietcool_selected_range) = "MED";
          } else {
            id(quietcool_selected_range) = "LOW";
          }
      - script.execute:
          id: start_quietcool_mode
          mode: "Run"
      - script.wait: start_quietcool_mode
      - event.trigger:
          id: fan_on_event
          event_type: fan_on
    on_turn_off:
      - logger.log: "Turning off"
      - script.execute:
          id: set_mode
          mode: "Idle"
      - script.wait: set_mode
      - event.trigger:
          id: fan_off_event
          event_type: fan_off

# Timer Controls
# ----------------------------------------
# Provides user-adjustable timer settings:
# - Hours (0-23)
# - Minutes (0-59)
# Values are applied when Timer mode is selected or the timer button is pressed.
number:
  - platform: template
    name: "Timer Hours"
    id: timer_hours
    min_value: 0
    max_value: 23
    step: 1
    unit_of_measurement: "h"
    device_class: duration
    optimistic: true
    initial_value: 3

  - platform: template
    name: "Timer Minutes"
    id: timer_minutes
    min_value: 0
    max_value: 59
    step: 1
    unit_of_measurement: "m"
    device_class: duration
    optimistic: true
    initial_value: 0

select:
  - platform: template
    name: "QuietCool Mode"
    id: quietcool_mode
    options:
      - "Idle"
      - "TH"
      - "Timer"
      - "Run"
    lambda: |-
      return id(quietcool_mode_state);
    set_action:
      - script.execute:
          id: start_quietcool_mode
          mode: !lambda return x;
      - script.wait: start_quietcool_mode
  - platform: template
    name: "QuietCool Timer Speed"
    id: quietcool_timer_speed
    options:
      - "LOW"
      - "MED"
      - "HIGH"
    lambda: |-
      return id(quietcool_timer_range);
    set_action:
      - lambda: |-
          id(quietcool_timer_range) = x;
          id(quietcool_timer_speed).publish_state(x);

# Device Configuration
# ----------------------------------------
# Stores device pairing ID and provides pairing button
# The pair ID is a 16-character hex string used for device authentication
text:
  - id: pair_id
    name: "Pair ID"
    platform: template
    mode: text
    min_length: 16
    max_length: 16
    optimistic: true
    initial_value: "a1b2c1d2a2b1c2d1"
    restore_value: true
  - id: raw_quietcool_command
    name: "Raw QuietCool Command"
    platform: template
    mode: text
    optimistic: true
    initial_value: '{"A":2}'
    restore_value: true

button:
  - platform: template
    name: "Pair BLE"
    id: pair_button
    on_press:
      then:
        - script.execute:
            id: send_ble_msg
            msg: !lambda return "{\"A\":14,\"P\":\"" + id(pair_id).state + "\"}";
        - script.wait: send_ble_msg
  - platform: template
    name: "Send Raw QuietCool Command"
    id: send_raw_quietcool_command_button
    on_press:
      then:
        # Known unsafe: A:11 with numeric S, such as {"A":11,"S":1}, causes BLE disconnect/reconnect.
        - if:
            condition:
              lambda: |-
                std::string cmd = id(raw_quietcool_command).state;
                std::string compact;
                for (char c : cmd) {
                  if (c != ' ' && c != '\t' && c != '\n' && c != '\r') {
                    compact += c;
                  }
                }
                bool is_a11 = compact.find("\"A\":11") != std::string::npos;
                bool has_numeric_s = compact.find("\"S\":0") != std::string::npos ||
                                     compact.find("\"S\":1") != std::string::npos ||
                                     compact.find("\"S\":2") != std::string::npos ||
                                     compact.find("\"S\":3") != std::string::npos ||
                                     compact.find("\"S\":4") != std::string::npos ||
                                     compact.find("\"S\":5") != std::string::npos ||
                                     compact.find("\"S\":6") != std::string::npos ||
                                     compact.find("\"S\":7") != std::string::npos ||
                                     compact.find("\"S\":8") != std::string::npos ||
                                     compact.find("\"S\":9") != std::string::npos;
                return !(is_a11 && has_numeric_s);
            then:
              - script.execute:
                  id: send_ble_msg
                  msg: !lambda return id(raw_quietcool_command).state;
              - script.wait: send_ble_msg
            else:
              - logger.log:
                  level: WARN
                  format: "Blocked unsafe QuietCool raw command: A:11 with numeric S causes BLE disconnect/reconnect"
  - platform: template
    name: "Poll QuietCool Parameters Now"
    id: poll_quietcool_parameters_now_button
    on_press:
      then:
        - script.execute:
            id: send_ble_msg
            msg: !lambda return "{\"A\":2}";
        - script.wait: send_ble_msg
  - platform: template
    name: "Poll QuietCool Work State Now"
    id: poll_quietcool_work_state_now_button
    on_press:
      then:
        - script.execute:
            id: send_ble_msg
            msg: !lambda return "{\"A\":1}";
        - script.wait: send_ble_msg
  - platform: template
    name: "Poll QuietCool Firmware Info Now"
    id: poll_quietcool_firmware_info_now_button
    on_press:
      then:
        - script.execute:
            id: send_ble_msg
            msg: !lambda return "{\"A\":3}";
        - script.wait: send_ble_msg
  - platform: template
    name: "Poll QuietCool Fan Info Now"
    id: poll_quietcool_fan_info_now_button
    on_press:
      then:
        - script.execute:
            id: send_ble_msg
            msg: !lambda return "{\"A\":17}";
        - script.wait: send_ble_msg
  - platform: template
    name: "Poll QuietCool Profiles Now"
    id: poll_quietcool_profiles_now_button
    on_press:
      then:
        - script.execute:
            id: send_ble_msg
            msg: !lambda return "{\"A\":19}";
        - script.wait: send_ble_msg
  - platform: template
    name: "QuietCool Run Low"
    id: quietcool_run_low_button
    on_press:
      - script.execute:
          id: set_manual_range
          speed: "LOW"
      - script.wait: set_manual_range
      - script.execute:
          id: set_mode
          mode: "Run"
      - script.wait: set_mode
  - platform: template
    name: "QuietCool Run Medium"
    id: quietcool_run_medium_button
    on_press:
      - script.execute:
          id: set_manual_range
          speed: "MED"
      - script.wait: set_manual_range
      - script.execute:
          id: set_mode
          mode: "Run"
      - script.wait: set_mode
  - platform: template
    name: "QuietCool Run High"
    id: quietcool_run_high_button
    on_press:
      - script.execute:
          id: set_manual_range
          speed: "HIGH"
      - script.wait: set_manual_range
      - script.execute:
          id: set_mode
          mode: "Run"
      - script.wait: set_mode
  - platform: template
    name: "Start QuietCool Timer"
    id: start_quietcool_timer_button
    on_press:
      then:
        - script.execute:
            id: start_quietcool_mode
            mode: "Timer"
        - script.wait: start_quietcool_mode
  - platform: template
    name: "Start QuietCool Smart Mode"
    id: start_quietcool_smart_mode_button
    on_press:
      then:
        - script.execute:
            id: start_quietcool_mode
            mode: "TH"
        - script.wait: start_quietcool_mode
  - platform: template
    name: "Stop QuietCool Fan"
    id: stop_quietcool_fan_button
    on_press:
      then:
        - script.execute:
            id: start_quietcool_mode
            mode: "Idle"
        - script.wait: start_quietcool_mode

# BLE Connection Control
# ----------------------------------------
# Turn this off from Home Assistant when you want to use the QuietCool mobile app.
# The interval poller below also checks this switch, so it will stop sending commands while disconnected.
switch:
  - platform: ble_client
    ble_client_id: qc_ble
    name: "QuietCool ESP BLE Connection"
    id: quietcool_ble_connection
    restore_mode: RESTORE_DEFAULT_ON

# Sensor Templates and Configurations
# ----------------------------------------
# Define reusable sensor templates for temperature and humidity
# These sensors receive data from the fan's built-in sensors
.humidity_sensor: &humidity_sensor
  platform: template
  unit_of_measurement: "%"
  device_class: humidity
  state_class: measurement

.temperature_sensor: &temperature_sensor
  platform: template
  unit_of_measurement: "°F"
  device_class: temperature
  state_class: measurement

sensor:
  - <<: *humidity_sensor
    name: humidity
    id: humidity
  - <<: *temperature_sensor
    name: temperature
    id: temperature
  - <<: *temperature_sensor
    name: temp_sample
    id: temp_sample
  - <<: *humidity_sensor
    name: humidity_sample
    id: humidity_sample
  - <<: *temperature_sensor
    name: "High Temperature Threshold"
    id: get_temp_h
  - <<: *temperature_sensor
    name: "Medium Temperature Threshold"
    id: get_temp_m
  - <<: *temperature_sensor
    name: "Low Temperature Threshold"
    id: get_temp_l
  - <<: *humidity_sensor
    name: "Humidity Shutoff Threshold"
    id: get_hum_h
  - <<: *humidity_sensor
    name: "Humidity Turn On Threshold"
    id: get_hum_l
  - platform: template
    name: "Timer Hours Readback"
    id: get_hour
    unit_of_measurement: "h"
    device_class: duration
    accuracy_decimals: 0
    disabled_by_default: true
  - platform: template
    name: "Timer Minutes Readback"
    id: get_minute
    unit_of_measurement: "m"
    device_class: duration
    accuracy_decimals: 0
    disabled_by_default: true
  - platform: template
    name: "Firmware Product Value"
    id: firmware_product_value
    accuracy_decimals: 0
    disabled_by_default: true

# Text Sensors and BLE Data Handling
# ----------------------------------------
# Various text sensors for monitoring fan state and settings
# The BLE data handler parses incoming JSON messages and updates appropriate sensors
text_sensor:
  - platform: template
    name: mode
    id: mode
  - platform: template
    name: "Live Speed"
    id: range
  - platform: template
    name: fan_type
    id: fan_type
    disabled_by_default: true
  - platform: template
    name: name
    id: name
    disabled_by_default: true
  - platform: template
    name: model
    id: model
    disabled_by_default: true
  - platform: template
    name: serial_num
    id: serial_num
    disabled_by_default: true
  - platform: template
    name: sensor_state
    id: sensor_state
    disabled_by_default: true
  - platform: template
    name: "Pairing Mode"
    id: pair_state
  - platform: template
    name: "Humidity Trigger Speed"
    id: get_hum_range
    disabled_by_default: true
  - platform: template
    name: "Timer Speed"
    id: get_time_range
    disabled_by_default: true
  - platform: template
    name: "Firmware Version"
    id: firmware_version
    disabled_by_default: true
  - platform: template
    name: "Firmware Date"
    id: firmware_date
    disabled_by_default: true
  - platform: template
    name: "Firmware Status"
    id: firmware_status
    disabled_by_default: true
  - platform: template
    name: "Firmware Hardware Status"
    id: firmware_hardware_status
    disabled_by_default: true
  - platform: template
    name: "Mode Write Success"
    id: mode_write_success
    disabled_by_default: true
  - platform: template
    name: "Manual Range Write Success"
    id: manual_range_write_success
    disabled_by_default: true
  - platform: template
    name: "Timer Write Success"
    id: timer_write_success
    disabled_by_default: true
  - platform: template
    name: "Profile Write Success"
    id: profile_write_success
    disabled_by_default: true
  - platform: template
    name: "QuietCool Profiles"
    id: quietcool_profiles
    disabled_by_default: true
  - platform: ble_client
    name: "BLE Data"
    id: quietcool_ble_data
    service_uuid: ${service_uuid}
    characteristic_uuid: ${characteristic_uuid}
    notify: true
    internal: true
    on_notify:
      - lambda: |-
            static std::string& accumulated = id(ble_message);
            accumulated += x;
            if (!x.empty() && x.back() == '}') {
              id(quietcool_ble_data).publish_state(accumulated);
              ESP_LOGD("quietcool", "Received JSON data: %s", accumulated.c_str());
              if (accumulated.rfind("QQ", 0) != 0) {
                ESP_LOGW("quietcool", "Ignoring BLE notification without QQ prefix: %s", accumulated.c_str());
                accumulated.clear();
                return;
              }
              bool parsed = false;
              // substr to remove "QQ" prefix from JSON response
              json::parse_json(accumulated.substr(2), [&parsed](JsonObject root) -> bool {
                parsed = true;
                
                 // Determine API (A) and populate sensors/text sensors accordingly
                int api = 0;
                if (!root["A"].isNull()) {
                  api = root["A"].as<int>();
                }

                bool live_fan_state_changed = false;
                auto publish_fan_from_cached = [&]() {
                  int fan_speed = 0;
                  if (id(quietcool_selected_range) == "HIGH") {
                    fan_speed = 3;
                  } else if (id(quietcool_selected_range) == "MED" || id(quietcool_selected_range) == "MEDIUM") {
                    fan_speed = 2;
                  } else if (id(quietcool_selected_range) == "LOW") {
                    fan_speed = 1;
                  }
                  id(quietcool_fan).state = (id(quietcool_mode_state) == "Run" && fan_speed > 0);
                  id(quietcool_fan).speed = id(quietcool_fan).state ? fan_speed : 0;
                  id(quietcool_fan).publish_state();
                };

                for (JsonObject::iterator it = root.begin(); it != root.end(); ++it) {
                  std::string key = it->key().c_str();

                  if (key == "A") {
                    continue; // Already processed API
                  }

                  // GetWorkState
                  if (api == 1) {
                    if (key == "C") { // Control Type but not currently used
                      continue;
                    }
                    if (key == "M") { // Mode
                      std::string v = it->value().as<std::string>();
                      id(mode).publish_state(v);
                      id(quietcool_mode_state) = v;
                      id(quietcool_mode).publish_state(v);
                      live_fan_state_changed = true;
                      continue;
                    }
                    if (key == "R") { // Actual live speed/range
                      std::string v = it->value().as<std::string>();
                      id(range).publish_state(v);
                      if (v == "LOW" || v == "MED" || v == "MEDIUM" || v == "HIGH") {
                        id(quietcool_selected_range) = (v == "MEDIUM") ? "MED" : v;
                      } else {
                        id(quietcool_selected_range) = "";
                      }
                      live_fan_state_changed = true;
                      continue;
                    }
                    if (key == "S") { // Sensor state
                      id(sensor_state).publish_state(it->value().as<std::string>());
                      continue;
                    }
                    if (key == "T") { // Temperature sample (tenths of °F, e.g. 871 -> 87.1°F)
                      float v = it->value().as<float>() / 10.0f;
                      id(temp_sample).publish_state(v);
                      id(temperature).publish_state(v);
                      continue;
                    }
                    if (key == "H") { // Humidity sample (%)
                      float v = it->value().as<float>();
                      id(humidity_sample).publish_state(v);
                      id(humidity).publish_state(v);
                      continue;
                    }
                  }

                  // GetParameter
                  if (api == 2) {
                    if (key == "B") { // Current/configured mode
                      std::string v = it->value().as<std::string>();
                      id(mode).publish_state(v);
                      id(quietcool_mode_state) = v;
                      id(quietcool_mode).publish_state(v);
                      continue;
                    }
                    if (key == "C") { // Fan type
                      id(fan_type).publish_state(it->value().as<std::string>());
                      continue;
                    }
                    if (key == "D") { // High temperature threshold (whole °F)
                      float v = it->value().as<float>();
                      if (v != 255.0f) {
                        id(get_temp_h).publish_state(v);
                      }
                      continue;
                    }
                    if (key == "E") { // Medium temperature threshold (whole °F)
                      float v = it->value().as<float>();
                      if (v != 255.0f) {
                        id(get_temp_m).publish_state(v);
                      }
                      continue;
                    }
                    if (key == "F") { // Low temperature threshold (whole °F)
                      float v = it->value().as<float>();
                      if (v != 255.0f) {
                        id(get_temp_l).publish_state(v);
                      }
                      continue;
                    }
                    if (key == "G") { // Humidity shutoff threshold
                      float v = it->value().as<float>();
                      if (v != 255.0f) {
                        id(get_hum_h).publish_state(v);
                      }
                      continue;
                    }
                    if (key == "H") { // Humidity turn-on threshold
                      float v = it->value().as<float>();
                      if (v != 255.0f) {
                        id(get_hum_l).publish_state(v);
                      }
                      continue;
                    }
                    if (key == "I") { // Humidity-trigger speed only; not live/manual Run speed
                      id(get_hum_range).publish_state(it->value().as<std::string>());
                      continue;
                    }
                    if (key == "J") { // Timer hours
                      id(get_hour).publish_state(it->value().as<float>());
                      continue;
                    }
                    if (key == "K") { // Timer minutes or minute bucket
                      id(get_minute).publish_state(it->value().as<float>());
                      continue;
                    }
                    if (key == "L") { // Timer speed only; not live/manual Run speed
                      std::string v = it->value().as<std::string>();
                      id(get_time_range).publish_state(v);
                      if (v == "LOW" || v == "MED" || v == "MEDIUM" || v == "HIGH") {
                        std::string timer_v = (v == "MEDIUM") ? "MED" : v;
                        id(quietcool_timer_range) = timer_v;
                        id(quietcool_timer_speed).publish_state(timer_v);
                      }
                      continue;
                    }
                    if (key == "M") { // Pairing mode / currently pairable state
                      id(pair_state).publish_state(it->value().as<std::string>());
                      continue;
                    }
                  }

                  // SetTimer acknowledgement. Persisted timer config should still be confirmed by polling A:2.
                  if (api == 7) {
                    if (key == "F") { // Success flag
                      id(timer_write_success).publish_state(it->value().as<std::string>());
                      continue;
                    }
                  }

                  // GetFirmwareStatus / device status. A:3 is not the smart-threshold write API.
                  if (api == 3) {
                    if (key == "V") { // Firmware version
                      id(firmware_version).publish_state(it->value().as<std::string>());
                      continue;
                    }
                    if (key == "P") { // Unknown product/protocol/build value
                      id(firmware_product_value).publish_state(it->value().as<float>());
                      continue;
                    }
                    if (key == "D") { // Firmware date
                      id(firmware_date).publish_state(it->value().as<std::string>());
                      continue;
                    }
                    if (key == "M") { // Online/status value
                      id(firmware_status).publish_state(it->value().as<std::string>());
                      continue;
                    }
                    if (key == "H") { // Unknown hardware/status value
                      id(firmware_hardware_status).publish_state(it->value().as<std::string>());
                      continue;
                    }
                  }

                  // SetMode acknowledgement. Persisted mode should still be confirmed by polling A:2.
                  if (api == 9) {
                    if (key == "W") { // Written/selected mode
                      std::string v = it->value().as<std::string>();
                      id(mode).publish_state(v);
                      id(quietcool_mode_state) = v;
                      id(quietcool_mode).publish_state(v);
                      publish_fan_from_cached();
                      continue;
                    }
                    if (key == "F") { // Success flag
                      id(mode_write_success).publish_state(it->value().as<std::string>());
                      continue;
                    }
                  }

                  // SetManualRange acknowledgement. A:18.S is the acknowledged live/manual range.
                  if (api == 18) {
                    if (key == "S") { // Acknowledged live/manual range
                      std::string v = it->value().as<std::string>();
                      id(range).publish_state(v);
                      if (v == "LOW" || v == "MED" || v == "MEDIUM" || v == "HIGH") {
                        id(quietcool_selected_range) = (v == "MEDIUM") ? "MED" : v;
                      }
                      publish_fan_from_cached();
                      continue;
                    }
                    if (key == "F") { // Success flag
                      id(manual_range_write_success).publish_state(it->value().as<std::string>());
                      continue;
                    }
                  }

                  // ReadProfiles. P is an array of profile rows:
                  // [name, high_temp, medium_temp, low_temp, humidity_shutoff, humidity_turn_on, humidity_speed].
                  if (api == 19) {
                    if (key == "P") {
                      std::string profiles;
                      serializeJson(it->value(), profiles);
                      id(quietcool_profiles).publish_state(profiles);
                      continue;
                    }
                  }

                  // Profile-ish acknowledgement. A:20 can return TRUE but has not been observed
                  // to apply profiles into A:2, so this is debug-only.
                  if (api == 20) {
                    if (key == "F") { // Success flag
                      id(profile_write_success).publish_state(it->value().as<std::string>());
                      continue;
                    }
                  }

                  // GetFanInfo
                  if (api == 17) {
                    if (key == "N") { // Name
                      id(name).publish_state(it->value().as<std::string>());
                      continue;
                    }
                    if (key == "M") { // Model
                      id(model).publish_state(it->value().as<std::string>());
                      continue;
                    }
                    if (key == "S") { // Serial number
                      id(serial_num).publish_state(it->value().as<std::string>());
                      continue;
                    }
                    if (key == "G") { // GuideSetup but not currently used
                      continue;
                    }
                  }

                  ESP_LOGD("quietcool", "No mapping for API %d key: %s", api, key.c_str());
                }

                if (api == 1 && live_fan_state_changed) {
                  publish_fan_from_cached();
                }

                return true;
              });
              if (!parsed) {
                ESP_LOGW("quietcool", "Failed to parse JSON: %s", accumulated.c_str());
              }
              accumulated.clear();
            }

# Periodic Updates
# ----------------------------------------
# Polls less aggressively so the QuietCool mobile app has a better chance to connect.
# Turn off the "QuietCool ESP BLE Connection" switch to fully release the BLE connection.
interval:
  - interval: 15s
    startup_delay: 20s
    then:
      - if:
          condition:
            switch.is_on: quietcool_ble_connection
          then:
            - script.execute:
                id: send_ble_msg
                msg: !lambda return "{\"A\":1}";
            - script.wait: send_ble_msg
  - interval: 60s
    startup_delay: 25s
    then:
      - if:
          condition:
            switch.is_on: quietcool_ble_connection
          then:
            - script.execute:
                id: send_ble_msg
                msg: !lambda return "{\"A\":2}";
            - script.wait: send_ble_msg

time:
  - platform: homeassistant
    id: homeassistant_time

event:
  - platform: template
    name: Fan On Event
    id: fan_on_event
    event_types:
      - fan_on
  - platform: template
    name: Fan Off Event
    id: fan_off_event
    event_types:
      - fan_off
