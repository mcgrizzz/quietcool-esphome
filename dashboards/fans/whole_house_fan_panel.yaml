############################################################
# WHOLE-HOUSE FAN DECISION PANEL
############################################################
type: vertical-stack
cards:
  - type: custom:button-card
    entity: fan.whole_house_fan_quietcool_fan
    name: Whole-House Fan
    icon: mdi:fan
    show_state: false
    show_label: true
    label: >
      [[[
        const modeRaw = states['sensor.whole_house_fan_mode']?.state || '-';
        const speedRaw = states['sensor.whole_house_fan_live_speed']?.state || '-';

        const mode =
          modeRaw === 'Idle' ? 'Off' :
          modeRaw === 'Run' ? 'Manual' :
          modeRaw === 'Timer' ? 'Timer' :
          modeRaw;

        const speed =
          speedRaw === 'CLOSE' ? 'Off' :
          speedRaw === 'LOW' ? 'Low' :
          speedRaw === 'MED' ? 'Medium' :
          speedRaw === 'MEDIUM' ? 'Medium' :
          speedRaw === 'HIGH' ? 'High' :
          speedRaw;

        return `${mode} \u00b7 ${speed}`;
      ]]]
    tap_action:
      action: more-info
    styles:
      card:
        - padding: 20px
        - border-radius: 22px
      grid:
        - grid-template-areas: '"i n" "i l"'
        - grid-template-columns: 58px 1fr
        - grid-template-rows: min-content min-content
      img_cell:
        - width: 48px
        - height: 48px
        - border-radius: 50%
        - background: rgba(255, 152, 0, 0.14)
      icon:
        - width: 30px
        - color: >
            [[[
              const speed = states['sensor.whole_house_fan_live_speed']?.state;
              return speed === 'CLOSE' ? 'var(--error-color)' : 'var(--primary-color)';
            ]]]
        - animation: >
            [[[
              const speed = states['sensor.whole_house_fan_live_speed']?.state;
              return ['LOW', 'MED', 'MEDIUM', 'HIGH'].includes(speed)
                ? 'qc-spin 1.1s linear infinite'
                : 'none';
            ]]]
      name:
        - justify-self: start
        - font-size: 24px
        - font-weight: 800
      label:
        - justify-self: start
        - font-size: 14px
        - opacity: 0.85
        - margin-top: 4px
    extra_styles: |
      @keyframes qc-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

  ########################################################
  # Conditions
  ########################################################
  - type: custom:button-card
    entity: sensor.whole_house_fan_conditions_headline
    triggers_update:
      - sensor.whole_house_fan_conditions_headline
      - sensor.whole_house_fan_conditions_message
      - sensor.whole_house_fan_conditions_severity
      - sensor.whole_house_fan_ac_status
      - sensor.indoor_bridgewater_dragino_temperature
      - sensor.indoor_bridgewater_dragino_humidity
      - sensor.indoor_bridgewater_dragino_dew_point
      - sensor.indoor_bridgewater_dragino_age_minutes
      - sensor.bridgewater_outdoor_dragino_temperature
      - sensor.bridgewater_outdoor_dragino_humidity
      - sensor.bridgewater_outdoor_dragino_dew_point
      - sensor.bridgewater_outdoor_dragino_age_minutes
      - sensor.whole_house_fan_comfort_summary
      - sensor.whole_house_fan_temperature_delta
      - sensor.whole_house_fan_dew_point_delta
    name: >
      [[[
        return (states['sensor.whole_house_fan_conditions_headline']?.state || 'Conditions unknown').trim();
      ]]]
    icon: mdi:home-thermometer-outline
    show_icon: false
    show_state: false
    show_label: true
    custom_fields:
      ac: >
        [[[
          return `AC: ${(states['sensor.whole_house_fan_ac_status']?.state || 'Unknown').trim()}`;
        ]]]
      inside: >
        [[[
          const value = (entityId, digits = 0, suffix = '') => {
            const raw = states[entityId]?.state;
            const n = Number(raw);
            return Number.isFinite(n) ? `${n.toFixed(digits)}${suffix}` : '-';
          };
          const age = states['sensor.indoor_bridgewater_dragino_age_minutes'];
          const freshness = age?.attributes?.freshness || 'stale';
          const ageText = age?.attributes?.age_text || 'Updated unknown';
          return `<div class="metric-title">Inside</div>
            <div class="metric-main">${value('sensor.indoor_bridgewater_dragino_temperature', 1, '\u00b0F')}</div>
            <div class="metric-sub">${value('sensor.indoor_bridgewater_dragino_humidity', 0, '% RH')} \u00b7 ${value('sensor.indoor_bridgewater_dragino_dew_point', 0, '\u00b0F dew')}</div>
            <div class="metric-age ${freshness}">${ageText}</div>`;
        ]]]
      outside: >
        [[[
          const value = (entityId, digits = 0, suffix = '') => {
            const raw = states[entityId]?.state;
            const n = Number(raw);
            return Number.isFinite(n) ? `${n.toFixed(digits)}${suffix}` : '-';
          };
          const age = states['sensor.bridgewater_outdoor_dragino_age_minutes'];
          const freshness = age?.attributes?.freshness || 'stale';
          const ageText = age?.attributes?.age_text || 'Updated unknown';
          return `<div class="metric-title">Outside</div>
            <div class="metric-main">${value('sensor.bridgewater_outdoor_dragino_temperature', 1, '\u00b0F')}</div>
            <div class="metric-sub">${value('sensor.bridgewater_outdoor_dragino_humidity', 0, '% RH')} \u00b7 ${value('sensor.bridgewater_outdoor_dragino_dew_point', 0, '\u00b0F dew')}</div>
            <div class="metric-age ${freshness}">${ageText}</div>`;
        ]]]
      comfort: >
        [[[
          const comfort = states['sensor.whole_house_fan_comfort_summary'];
          const ac = (states['sensor.whole_house_fan_ac_status']?.state || 'Unknown').trim();
          const acNote = ['Cooling', 'Unknown'].includes(ac) ? `AC ${ac.toLowerCase()}` : '';
          return `<div class="metric-title">Why</div>
            <div class="metric-main">${comfort?.state || 'Temp unknown'}</div>
            <div class="metric-sub">${comfort?.attributes?.moisture_summary || 'Moisture data unavailable'}</div>
            <div class="metric-age ${ac === 'Cooling' ? 'stale' : ac === 'Unknown' ? 'caution' : ''}">${acNote}</div>`;
        ]]]
    label: >
      [[[
        return (states['sensor.whole_house_fan_conditions_message']?.state || 'Temperature or moisture data is unavailable.').trim();
      ]]]
    tap_action:
      action: more-info
    styles:
      card:
        - padding: 18px
        - border-radius: 20px
        - background: >
            [[[
              const severity = (states['sensor.whole_house_fan_conditions_severity']?.state || 'unknown').trim();
              if (severity === 'bad') {
                return 'rgba(244, 67, 54, 0.12)';
              }
              if (severity === 'unknown') {
                return 'rgba(158, 158, 158, 0.13)';
              }
              if (severity === 'caution') return 'rgba(255, 152, 0, 0.14)';
              return 'rgba(0, 188, 212, 0.13)';
            ]]]
      grid:
        - grid-template-areas: '"n n ac" "l l l" "inside outside comfort"'
        - grid-template-columns: repeat(3, minmax(0, 1fr))
        - grid-template-rows: min-content min-content min-content
        - column-gap: 10px
        - row-gap: 12px
      name:
        - justify-self: start
        - align-self: center
        - font-size: 22px
        - font-weight: 800
      label:
        - justify-self: stretch
        - text-align: left
        - white-space: normal
        - line-height: 1.35
        - font-size: 14px
        - font-weight: 600
        - opacity: 0.9
      custom_fields:
        ac:
          - justify-self: end
          - align-self: center
          - border-radius: 999px
          - padding: 5px 10px
          - font-size: 12px
          - font-weight: 800
          - background: >
              [[[
                const ac = (states['sensor.whole_house_fan_ac_status']?.state || 'Unknown').trim();
                return ac === 'Cooling'
                  ? 'rgba(244, 67, 54, 0.18)'
                  : ac === 'Unknown'
                    ? 'rgba(158, 158, 158, 0.18)'
                    : ac === 'Idle'
                      ? 'rgba(255, 152, 0, 0.18)'
                      : 'rgba(76, 175, 80, 0.18)';
              ]]]
          - color: >
              [[[
                const ac = (states['sensor.whole_house_fan_ac_status']?.state || 'Unknown').trim();
                return ac === 'Cooling'
                  ? 'var(--error-color)'
                  : ac === 'Unknown'
                    ? 'var(--secondary-text-color)'
                    : ac === 'Idle'
                      ? 'var(--warning-color)'
                      : 'var(--success-color)';
              ]]]
        inside:
          - grid-area: inside
          - align-self: stretch
          - justify-self: stretch
          - text-align: left
          - border-radius: 14px
          - padding: 10px
          - background: var(--ha-card-background)
          - box-shadow: var(--ha-card-box-shadow)
          - overflow: hidden
        outside:
          - grid-area: outside
          - align-self: stretch
          - justify-self: stretch
          - text-align: left
          - border-radius: 14px
          - padding: 10px
          - background: var(--ha-card-background)
          - box-shadow: var(--ha-card-box-shadow)
          - overflow: hidden
        comfort:
          - grid-area: comfort
          - align-self: stretch
          - justify-self: stretch
          - text-align: left
          - border-radius: 14px
          - padding: 10px
          - background: var(--ha-card-background)
          - box-shadow: var(--ha-card-box-shadow)
          - overflow: hidden
    extra_styles: |
      .metric-title {
        font-size: 12px;
        font-weight: 700;
        opacity: 0.7;
        line-height: 1.2;
      }
      .metric-main {
        margin-top: 4px;
        font-size: 18px;
        font-weight: 800;
        line-height: 1.2;
        color: var(--primary-text-color);
      }
      .metric-sub {
        margin-top: 4px;
        font-size: 12px;
        line-height: 1.25;
        color: var(--primary-text-color);
        opacity: 0.86;
      }
      .metric-age {
        margin-top: 6px;
        font-size: 11px;
        font-weight: 700;
        line-height: 1.2;
        opacity: 0.8;
      }
      .metric-age.caution {
        color: var(--warning-color);
        opacity: 1;
      }
      .metric-age.stale {
        color: var(--error-color);
        opacity: 1;
      }
      @media (max-width: 600px) {
        #container {
          grid-template-areas:
            "n n ac"
            "l l l"
            "inside inside inside"
            "outside outside outside"
            "comfort comfort comfort" !important;
        }
      }

  - type: custom:button-card
    name: Open windows before starting the whole-house fan.
    icon: mdi:window-open-variant
    show_state: false
    tap_action:
      action: none
    styles:
      card:
        - min-height: 62px
        - border-radius: 16px
        - padding: 12px 14px
        - background: rgba(255, 152, 0, 0.16)
      grid:
        - grid-template-areas: '"i n"'
        - grid-template-columns: 42px 1fr
      icon:
        - width: 28px
        - color: var(--warning-color)
      name:
        - justify-self: start
        - white-space: normal
        - text-align: left
        - font-size: 14px
        - font-weight: 700

  ########################################################
  # Fan Controls
  ########################################################
  - type: grid
    columns: 4
    square: false
    cards:
      - type: custom:button-card
        name: OFF
        icon: mdi:fan-off
        show_state: false
        tap_action:
          action: call-service
          service: script.quietcool_cancel_timer_then_off
          service_data:
            timer_entity: timer.quietcool_whole_house_fan_timer
            off_button: button.whole_house_fan_stop_quietcool_fan
        styles:
          card:
            - height: 76px
            - border-radius: 20px
            - background: >
                [[[
                  const mode = states['sensor.whole_house_fan_mode']?.state;
                  return mode === 'Idle'
                    ? 'rgba(158, 158, 158, 0.16)'
                    : 'var(--ha-card-background)';
                ]]]
          icon:
            - width: 30px
            - color: >
                [[[
                  const mode = states['sensor.whole_house_fan_mode']?.state;
                  return mode === 'Idle' ? 'var(--primary-text-color)' : 'var(--primary-text-color)';
                ]]]
          name:
            - font-weight: 800
            - font-size: 14px
            - letter-spacing: 0
            - color: >
                [[[
                  const mode = states['sensor.whole_house_fan_mode']?.state;
                  return mode === 'Idle' ? 'var(--primary-text-color)' : 'var(--primary-text-color)';
                ]]]

      - type: custom:button-card
        name: Low
        icon: mdi:fan-speed-1
        show_state: false
        tap_action:
          action: call-service
          service: script.quietcool_cancel_timer_then_run
          service_data:
            timer_entity: timer.quietcool_whole_house_fan_timer
            run_button: button.whole_house_fan_quietcool_run_low
            run_speed: LOW
            raw_command_text: text.whole_house_fan_raw_quietcool_command
            send_raw_button: button.whole_house_fan_send_raw_quietcool_command
        styles:
          card:
            - height: 76px
            - border-radius: 20px
            - background: >
                [[[
                  const speed = states['sensor.whole_house_fan_live_speed']?.state;
                  return speed === 'LOW'
                    ? 'rgba(0, 188, 212, 0.22)'
                    : 'var(--ha-card-background)';
                ]]]
          icon:
            - width: 30px
            - animation: >
                [[[
                  const speed = states['sensor.whole_house_fan_live_speed']?.state;
                  return speed === 'LOW'
                    ? 'qc-spin 2s linear infinite'
                    : 'none';
                ]]]
          name:
            - font-weight: 800
            - font-size: 14px

      - type: custom:button-card
        name: Medium
        icon: mdi:fan-speed-2
        show_state: false
        tap_action:
          action: call-service
          service: script.quietcool_cancel_timer_then_run
          service_data:
            timer_entity: timer.quietcool_whole_house_fan_timer
            run_button: button.whole_house_fan_quietcool_run_medium
            run_speed: MED
            raw_command_text: text.whole_house_fan_raw_quietcool_command
            send_raw_button: button.whole_house_fan_send_raw_quietcool_command
        styles:
          card:
            - height: 76px
            - border-radius: 20px
            - background: >
                [[[
                  const speed = states['sensor.whole_house_fan_live_speed']?.state;
                  return speed === 'MED' || speed === 'MEDIUM'
                    ? 'rgba(0, 188, 212, 0.22)'
                    : 'var(--ha-card-background)';
                ]]]
          icon:
            - width: 30px
            - animation: >
                [[[
                  const speed = states['sensor.whole_house_fan_live_speed']?.state;
                  return speed === 'MED' || speed === 'MEDIUM'
                    ? 'qc-spin 1.2s linear infinite'
                    : 'none';
                ]]]
          name:
            - font-weight: 800
            - font-size: 14px

      - type: custom:button-card
        name: High
        icon: mdi:fan-speed-3
        show_state: false
        tap_action:
          action: call-service
          service: script.quietcool_cancel_timer_then_run
          service_data:
            timer_entity: timer.quietcool_whole_house_fan_timer
            run_button: button.whole_house_fan_quietcool_run_high
            run_speed: HIGH
            raw_command_text: text.whole_house_fan_raw_quietcool_command
            send_raw_button: button.whole_house_fan_send_raw_quietcool_command
        styles:
          card:
            - height: 76px
            - border-radius: 20px
            - background: >
                [[[
                  const speed = states['sensor.whole_house_fan_live_speed']?.state;
                  return speed === 'HIGH'
                    ? 'rgba(0, 188, 212, 0.22)'
                    : 'var(--ha-card-background)';
                ]]]
          icon:
            - width: 30px
            - animation: >
                [[[
                  const speed = states['sensor.whole_house_fan_live_speed']?.state;
                  return speed === 'HIGH'
                    ? 'qc-spin 0.75s linear infinite'
                    : 'none';
                ]]]
          name:
            - font-weight: 800
            - font-size: 14px

  ########################################################
  # Timer
  ########################################################
  - type: conditional
    conditions:
      - entity: timer.quietcool_whole_house_fan_timer
        state_not: active
    card:
      type: custom:bubble-card
      card_type: button
      button_type: name
      name: Start Timed Run
      icon: mdi:timer-play-outline
      button_action:
        tap_action:
          action: navigate
          navigation_path: '#quietcool-whole-house-timer'

  - type: conditional
    conditions:
      - entity: timer.quietcool_whole_house_fan_timer
        state: active
    card:
      type: custom:button-card
      update_timer: 1000
      triggers_update:
        - timer.quietcool_whole_house_fan_timer
        - sensor.whole_house_fan_live_speed
      name: >
        [[[
          const speedRaw = states['sensor.whole_house_fan_live_speed']?.state || 'LOW';
          const speed =
            speedRaw === 'CLOSE' ? 'Off' :
            speedRaw === 'LOW' ? 'Low' :
            speedRaw === 'MED' ? 'Medium' :
            speedRaw === 'MEDIUM' ? 'Medium' :
            speedRaw === 'HIGH' ? 'High' :
            speedRaw;

          const timer = states['timer.quietcool_whole_house_fan_timer'];
          const finishesAt = timer?.attributes?.finishes_at;
          let remaining = 'running';

          if (finishesAt) {
            const end = new Date(finishesAt).getTime();
            const now = Date.now();
            const seconds = Math.max(0, Math.floor((end - now) / 1000));
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            remaining = h > 0
              ? `${h}h ${String(m).padStart(2, '0')}m`
              : `${m}:${String(s).padStart(2, '0')}`;
          }

          return `Running ${speed} \u00b7 returns to Off in ${remaining}`;
        ]]]
      icon: mdi:timer-sand
      show_state: false
      tap_action:
        action: more-info
        entity: timer.quietcool_whole_house_fan_timer
      styles:
        card:
          - min-height: 86px
          - border-radius: 20px
          - background: rgba(0, 188, 212, 0.18)
          - padding: 14px
        grid:
          - grid-template-areas: '"i n"'
          - grid-template-columns: 52px 1fr
        icon:
          - width: 32px
          - color: var(--primary-color)
        name:
          - justify-self: start
          - text-align: left
          - white-space: normal
          - font-weight: 800
          - font-size: 17px

  - type: conditional
    conditions:
      - entity: timer.quietcool_whole_house_fan_timer
        state: active
    card:
      type: custom:button-card
      name: Cancel Timer
      icon: mdi:timer-remove-outline
      show_state: false
      tap_action:
        action: custom
        custom: |
          [[[
            const status = states['input_text.quietcool_whole_house_fan_command_status']?.state || 'Idle';
            const pending = status.startsWith('Sending') || status.startsWith('Retry');
            if (pending) return;
            hass.callService('script', 'quietcool_cancel_timer_then_previous_state', {
              timer_entity: 'timer.quietcool_whole_house_fan_timer',
              previous_mode_entity: 'input_select.quietcool_whole_house_fan_timer_previous_mode',
              previous_speed_entity: 'input_select.quietcool_whole_house_fan_timer_previous_speed',
              raw_command_text: 'text.whole_house_fan_raw_quietcool_command',
              send_raw_button: 'button.whole_house_fan_send_raw_quietcool_command',
              current_mode_entity: 'sensor.whole_house_fan_mode',
              live_speed_entity: 'sensor.whole_house_fan_live_speed',
              status_entity: 'input_text.quietcool_whole_house_fan_command_status',
              off_button: 'button.whole_house_fan_stop_quietcool_fan',
              fallback_speed: 'LOW'
            });
          ]]]
      styles:
        card:
          - height: 68px
          - border-radius: 20px
          - background: >
              [[[
                const status = states['input_text.quietcool_whole_house_fan_command_status']?.state || 'Idle';
                return status.startsWith('Sending') || status.startsWith('Retry')
                  ? 'rgba(158, 158, 158, 0.14)'
                  : 'rgba(244, 67, 54, 0.16)';
              ]]]
          - opacity: >
              [[[
                const status = states['input_text.quietcool_whole_house_fan_command_status']?.state || 'Idle';
                return status.startsWith('Sending') || status.startsWith('Retry') ? '0.55' : '1';
              ]]]
        icon:
          - width: 28px
          - color: >
              [[[
                const status = states['input_text.quietcool_whole_house_fan_command_status']?.state || 'Idle';
                return status.startsWith('Sending') || status.startsWith('Retry')
                  ? 'var(--disabled-text-color)'
                  : 'var(--error-color)';
              ]]]
        name:
          - font-weight: 800
          - font-size: 16px
