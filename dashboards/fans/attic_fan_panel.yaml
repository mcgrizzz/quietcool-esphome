############################################################
# COMPACT ATTIC FAN STATUS
############################################################
type: vertical-stack
cards:
  - type: custom:button-card
    entity: fan.attic_exhaust_fan_quietcool_fan
    name: Attic Exhaust Fan
    icon: mdi:fan
    show_state: false
    show_label: true
    label: >
      [[[
        const temp = parseFloat(states['sensor.attic_exhaust_fan_temperature']?.state);
        const hum = parseFloat(states['sensor.attic_exhaust_fan_humidity']?.state);
        const modeRaw = states['sensor.attic_exhaust_fan_mode']?.state || '-';
        const speedRaw = states['sensor.attic_exhaust_fan_live_speed']?.state || '-';

        const mode =
          modeRaw === 'TH' ? 'Smart' :
          modeRaw === 'Idle' ? 'Off' :
          modeRaw === 'Run' ? 'Manual' :
          modeRaw === 'Timer' ? 'Timer' :
          modeRaw;

        const speed =
          speedRaw === 'CLOSE' ? 'Off' :
          speedRaw === 'LOW' ? 'Low' :
          speedRaw === 'MED' ? 'Medium' :
          speedRaw === 'MEDIUM' ? 'Medium' :
          speedRaw === 'HIGH' ? 'High' :
          speedRaw;

        const tempText = isNaN(temp) ? '-' : `${temp.toFixed(1)}\u00b0F`;
        const humText = isNaN(hum) ? '-' : `${hum.toFixed(0)}%`;
        return `${mode} \u00b7 ${speed} \u00b7 ${tempText} \u00b7 ${humText}`;
      ]]]
    tap_action:
      action: navigate
      navigation_path: '#quietcool-attic-manage'
    styles:
      card:
        - padding: 16px
        - border-radius: 18px
      grid:
        - grid-template-areas: '"i n" "i l"'
        - grid-template-columns: 48px 1fr
        - grid-template-rows: min-content min-content
      img_cell:
        - width: 40px
        - height: 40px
        - border-radius: 50%
        - background: rgba(0, 188, 212, 0.12)
      icon:
        - width: 26px
        - color: >
            [[[
              const speed = states['sensor.attic_exhaust_fan_live_speed']?.state;
              return speed === 'CLOSE' ? 'var(--error-color)' : 'var(--primary-color)';
            ]]]
        - animation: >
            [[[
              const speed = states['sensor.attic_exhaust_fan_live_speed']?.state;
              return ['LOW', 'MED', 'MEDIUM', 'HIGH'].includes(speed)
                ? 'qc-spin 1.1s linear infinite'
                : 'none';
            ]]]
      name:
        - justify-self: start
        - font-size: 18px
        - font-weight: 800
      label:
        - justify-self: start
        - text-align: left
        - white-space: normal
        - font-size: 14px
        - opacity: 0.85
        - margin-top: 4px
    extra_styles: |
      @keyframes qc-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

  - type: custom:bubble-card
    card_type: button
    button_type: name
    name: Manage
    icon: mdi:cog-outline
    button_action:
      tap_action:
        action: navigate
        navigation_path: '#quietcool-attic-manage'
